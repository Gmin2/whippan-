<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>whippan — tracer</title>
  <style>
    body { margin: 0; background: #16171d; color: #eee; font: 14px system-ui; }
    main { max-width: 760px; margin: 40px auto; }
    canvas { width: 100%; border-radius: 8px; display: block; background: #000; }
    .row { display: flex; gap: 12px; align-items: center; margin-top: 16px; }
    input[type=range] { flex: 1; }
    code { color: #f02900; }
  </style>
  <script src="./vendor/canvaskit/canvaskit.js"></script>
</head>
<body>
  <main>
    <canvas id="c" width="1920" height="1080"></canvas>
    <div class="row">
      <span>t</span>
      <input id="t" type="range" min="0" max="2.5" step="0.01" value="0" />
      <span id="tv" style="width:52px">0.00s</span>
    </div>
    <p>engine: <code id="status">loading…</code></p>
  </main>

  <script type="module">
    import init, { render } from './src/engine-pkg/whippan_engine.js';

    const stage = JSON.stringify({
      fps: 30, size: [1920, 1080],
      scenes: [{ id: 's1', bg: '#fafafa', nodes: [
        { id: 'title', type: 'text', text: 'The fastest way to scale',
          x: 960, y: 500,
          font: { family: 'inter', weight: 600, size: 72 }, color: '#161616' },
        { id: 'pill', type: 'rect', x: 960, y: 660, w: 480, h: 96,
          radius: 48, fill: '#ea752f' }
      ] }]
    });

    const overlay = JSON.stringify({
      tracks: [
        { target: 'title', at: 0, keys: {
            opacity: [{ t: 0, v: 0 }, { t: 0.27, v: 1, ease: 'outCubic' }],
            y:       [{ t: 0, v: 40 }, { t: 0.27, v: 0, ease: 'outCubic' }]
        } },
        { target: 'pill', at: 1.1, keys: {
            opacity: [{ t: 0, v: 0 }, { t: 0.05, v: 1 }],
            scale:   [{ t: 0, v: 0.96 }, { t: 0.17, v: 1, ease: [0.22, 1, 0.36, 1] }]
        } }
      ]
    });

    const [CK, , fontBytes] = await Promise.all([
      CanvasKitInit({ locateFile: f => './vendor/canvaskit/' + f }),
      init(),
      fetch('./assets/fonts/Inter-Variable.ttf').then(r => r.arrayBuffer()),
    ]);

    const surface = CK.MakeCanvasSurface('c');
    const skc = surface.getCanvas();
    const typeface = CK.Typeface.MakeFreeTypeFaceFromData(fontBytes);
    const paint = new CK.Paint();
    paint.setAntiAlias(true);
    const fonts = new Map();
    const fontFor = size => {
      if (!fonts.has(size)) fonts.set(size, new CK.Font(typeface, size));
      return fonts.get(size);
    };

    const slider = document.getElementById('t');
    const tv = document.getElementById('tv');

    function frame(t) {
      skc.clear(CK.parseColorString('#fafafa'));
      const cmds = JSON.parse(render(stage, overlay, t));
      for (const c of cmds) {
        const col = CK.parseColorString(c.color);
        col[3] = c.opacity;
        paint.setColor(col);
        skc.save();
        skc.translate(c.x, c.y);
        skc.scale(c.scale, c.scale);
        if (c.op === 'text') {
          const font = fontFor(c.size);
          const ids = font.getGlyphIDs(c.text);
          const width = font.getGlyphWidths(ids).reduce((a, b) => a + b, 0);
          const m = font.getMetrics();
          const baseline = -(m.ascent + m.descent) / 2;
          skc.drawText(c.text, -width / 2, baseline, paint, font);
        } else if (c.op === 'rect') {
          const rr = CK.RRectXY(
            CK.LTRBRect(-c.w / 2, -c.h / 2, c.w / 2, c.h / 2),
            c.radius, c.radius);
          skc.drawRRect(rr, paint);
        }
        skc.restore();
      }
      surface.flush();
      tv.textContent = t.toFixed(2) + 's';
    }

    document.getElementById('status').textContent = 'whippan-engine (wasm) + skia ready';
    slider.addEventListener('input', () => frame(parseFloat(slider.value)));
    frame(0);
  </script>
</body>
</html>
