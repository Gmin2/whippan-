<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>whippan — tracer</title>
  <style>
    body { margin: 0; background: #16171d; color: #eee; font: 14px system-ui; }
    main { max-width: 760px; margin: 40px auto; }
    canvas { width: 100%; border-radius: 8px; display: block; background: #000; }
    .row { display: flex; gap: 12px; align-items: center; margin-top: 16px; }
    input[type=range] { flex: 1; }
    button { background: #f02900; color: #fff; border: 0; border-radius: 6px;
             padding: 6px 18px; font: inherit; cursor: pointer; }
    code { color: #f02900; }
  </style>
  <script src="/assets/canvaskit/canvaskit.js"></script>
</head>
<body>
  <main>
    <canvas id="c" width="1920" height="1080"></canvas>
    <div class="row">
      <button id="play">play</button>
      <input id="t" type="range" min="0" max="9.8" step="0.01" value="0" />
      <span id="tv" style="width:52px">0.00s</span>
    </div>
    <p>engine: <code id="status">loading…</code></p>
  </main>

  <script type="module">
    import init, { render, register_font } from './src/engine-pkg/whippan_engine.js';
    import { paintFrame } from './src/painter.js';

    const stage = JSON.stringify({
      fps: 30, size: [1920, 1080],
      scenes: [
        { id: 'hook', bg: '#fafafa', dur: 2.2, nodes: [
          { id: 'title', type: 'text', text: 'The fastest way to scale',
            x: 960, y: 540,
            font: { family: 'inter', weight: 600, size: 72 }, color: '#161616' }
        ] },
        { id: 'pill-beat', bg: '#fafafa', dur: 2.0,
          transition: { kind: 'fade', dur: 0.4 }, nodes: [
          { id: 'mark', type: 'image', src: '/assets/demo/mark.png',
            x: 960, y: 340, w: 170, h: 170, radius: 34 },
          { id: 'claim', type: 'text', text: 'Pro motion by default',
            x: 960, y: 520,
            font: { family: 'inter', weight: 600, size: 56 }, color: '#161616' },
          { id: 'pill', type: 'rect', x: 960, y: 660, w: 480, h: 96,
            radius: 48, fill: '#ea752f' }
        ] },
        { id: 'click', bg: '#fafafa', dur: 3.0,
          transition: { kind: 'fade', dur: 0.35 }, nodes: [
          { id: 'btn', type: 'rect', x: 960, y: 540, w: 340, h: 92, radius: 46,
            fill: '#ea752f',
            states: { pressed: { fill: '#c85a1a', scale: 0.96 } } },
          { id: 'btnlabel', type: 'text', text: 'Generate',
            x: 960, y: 540,
            font: { family: 'inter', weight: 600, size: 38 }, color: '#ffffff' },
          { id: 'card', type: 'rect', x: 960, y: 780, w: 620, h: 150, radius: 24,
            fill: '#ffffff' },
          { id: 'cardtext', type: 'text', text: 'Launch video ready',
            x: 960, y: 780,
            font: { family: 'inter', weight: 600, size: 40 }, color: '#161616' },
          { id: 'cur', type: 'cursor', x: 620, y: 800, w: 30 }
        ] },
        { id: 'terminal', bg: '#050505', dur: 2.6,
          transition: { kind: 'fade', dur: 0.35 }, nodes: [
          { id: 'tpill', type: 'rect', x: 960, y: 520, w: 760, h: 116,
            radius: 58, fill: '#4a21d5',
            gradient: { angle: 90, stops: [
              { at: 0, color: '#6a44f0' },
              { at: 0.55, color: '#4a21d5' },
              { at: 1, color: '#341786' }
            ] },
            glow: { sigma: 46, opacity: 0.9, dy: -18 } },
          { id: 'cmd', type: 'text', text: '$ npm init @shopify/shop-mini@latest',
            x: 960, y: 520,
            font: { family: 'mono', weight: 400, size: 32 }, color: '#d4bcfe' }
        ] }
      ]
    });

    const overlay = JSON.stringify({
      tracks: [
        { target: 'title', at: 0.2, reveal: { unit: 'glyph', stagger: 0.03, keep: ['scale'] } },
        { target: 'mark', at: 0.35, keys: {
            opacity: [{ t: 0, v: 0 }, { t: 0.12, v: 1 }],
            scale:   [{ t: 0, v: 0.9 }, { t: 0.3, v: 1, ease: [0.22, 1, 0.36, 1] }],
            y:       [{ t: 0, v: 24 }, { t: 0.3, v: 0, ease: 'outCubic' }]
        } },
        { target: 'claim', at: 0.55, reveal: { unit: 'word', keep: ['default'] } },
        { target: 'pill', at: 0.75, keys: {
            opacity: [{ t: 0, v: 0 }, { t: 0.05, v: 1 }],
            scale:   [{ t: 0, v: 0.96 }, { t: 0.17, v: 1, ease: [0.22, 1, 0.36, 1] }]
        } },
        { target: 'card', at: 0, keys: { opacity: [{ t: 0, v: 0 }] } },
        { target: 'cardtext', at: 0, keys: { opacity: [{ t: 0, v: 0 }] } },
        { target: 'cur', at: 0.4, keys: {
            x: [{ t: 0, v: 0 }, { t: 0.7, v: 340, ease: 'inOutCubic' }],
            y: [{ t: 0, v: 0 }, { t: 0.7, v: -250, ease: 'inOutCubic' }]
        } },
        { target: 'btn', at: 1.35, state: 'pressed' },
        { target: 'btn', at: 1.5, state: 'base' },
        { target: 'card', at: 1.6, keys: {
            opacity: [{ t: 0, v: 0 }, { t: 0.12, v: 1 }],
            y: [{ t: 0, v: 30 }, { t: 0.3, v: 0, ease: 'outCubic' }],
            scale: [{ t: 0, v: 0.96 }, { t: 0.3, v: 1, ease: [0.22, 1, 0.36, 1] }]
        } },
        { target: 'cardtext', at: 1.7, keys: {
            opacity: [{ t: 0, v: 0 }, { t: 0.15, v: 1 }],
            y: [{ t: 0, v: 20 }, { t: 0.3, v: 0, ease: 'outCubic' }]
        } },
        { target: 'tpill', loop: true, keys: {
            glow_opacity: [
              { t: 0, v: 0.78 },
              { t: 0.725, v: 1.0, ease: 'inOutCubic' },
              { t: 1.45, v: 0.78, ease: 'inOutCubic' }
            ],
            glow_sigma: [
              { t: 0, v: 42 },
              { t: 0.725, v: 50, ease: 'inOutCubic' },
              { t: 1.45, v: 42, ease: 'inOutCubic' }
            ]
        } }
      ]
    });

    const [CK, , interBytes, monoBytes] = await Promise.all([
      CanvasKitInit({ locateFile: f => '/assets/canvaskit/' + f }),
      init(),
      fetch('/assets/fonts/Inter-Variable.ttf').then(r => r.arrayBuffer()),
      fetch('/assets/fonts/JetBrainsMono-Regular.ttf').then(r => r.arrayBuffer()),
    ]);
    register_font('inter', new Uint8Array(interBytes));
    register_font('mono', new Uint8Array(monoBytes));

    // load every bitmap the stage references, keyed by src
    const images = new Map();
    const srcs = [...new Set(
      JSON.parse(stage).scenes.flatMap(s => s.nodes)
        .filter(n => n.type === 'image' && n.src).map(n => n.src)
    )];
    await Promise.all(srcs.map(async src => {
      const buf = await fetch(src).then(r => r.arrayBuffer());
      images.set(src, CK.MakeImageFromEncoded(new Uint8Array(buf)));
    }));

    const surface = CK.MakeCanvasSurface('c');
    const skc = surface.getCanvas();
    const paint = new CK.Paint();
    paint.setAntiAlias(true);

    const slider = document.getElementById('t');
    const tv = document.getElementById('tv');
    const playBtn = document.getElementById('play');
    const DUR = 9.8;

    function frame(t) {
      const cmds = JSON.parse(render(stage, overlay, t));
      paintFrame(CK, skc, paint, cmds, images);
      surface.flush();
      tv.textContent = t.toFixed(2) + 's';
    }

    let playing = false;
    let t0 = 0;
    let base = 0;
    function tick(now) {
      if (!playing) return;
      let t = base + (now - t0) / 1000;
      if (t > DUR) { t = 0; base = 0; t0 = now; }
      slider.value = t;
      frame(t);
      requestAnimationFrame(tick);
    }
    playBtn.addEventListener('click', () => {
      playing = !playing;
      playBtn.textContent = playing ? 'pause' : 'play';
      if (playing) {
        base = parseFloat(slider.value);
        if (base >= DUR) base = 0;
        t0 = performance.now();
        requestAnimationFrame(tick);
      }
    });
    slider.addEventListener('input', () => {
      playing = false;
      playBtn.textContent = 'play';
      frame(parseFloat(slider.value));
    });

    document.getElementById('status').textContent = 'whippan-engine (wasm) + skia ready';
    frame(0);
  </script>
</body>
</html>
